<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>UniLock Hub Booking</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
</head>
<body>
  <header>
    <h1>UniLock Hub Booking</h1>
    <p>Stash and Dash – Quick, Easy, Secure</p>
  </header>

  <!-- Action Buttons -->
  <section id="actions">
    <button class="primary-btn" onclick="showLocations()">Instant Booking</button>
    <button class="secondary-btn">QR Access</button>
  </section>

  <!-- Location Selection -->
  <section id="locations" style="display:none;">
    <h2>Select Location</h2>
    <p>Choose where you need a locker</p>
    <div class="card" onclick="showLockers('DPT')">
      <img src="dpt_building.jpg" alt="DPT Building">
      <h3>DPT Building Ground Floor</h3>
      <p id="dptCount">8 lockers • 8 available</p>
    </div>
    <div class="card" onclick="showLockers('Gym')">
      <img src="gym.jpg" alt="Gym">
      <h3>Gym</h3>
      <p id="gymCount">6 lockers • 6 available</p>
    </div>
  </section>

  <!-- Locker Grid -->
  <section id="lockers"></section>

  <!-- Booking Form Modal -->
  <div id="bookingForm" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeForm()">&times;</span>
      <h2>Book Locker</h2>
      <label for="studentId">Student ID:</label>
      <input id="studentId" type="text">
      <label for="fullName">Full Name:</label>
      <input id="fullName" type="text">
      <label for="date">Date:</label>
      <input id="date" type="date">
      <label for="startTime">Start Time:</label>
      <input id="startTime" type="time">
      <label for="endTime">End Time:</label>
      <input id="endTime" type="time">
      <button class="primary-btn" onclick="confirmBooking()">Confirm Booking</button>
    </div>
  </div>

  <!-- Booking Info -->
  <section id="bookingInfo" style="display:none;">
    <h2>Booking Information</h2>
    <p id="infoText"></p>
    <div id="qrcode"></div>
    <button class="primary-btn" onclick="completeBooking()">Mark as Complete</button>
    <button class="secondary-btn" onclick="cancelBooking()">Cancel Booking</button>
  </section>

  <script src="script.js"></script>
</body>
</html>
